<!-- AGENDA Y CALENDARIO -->
<div class="page active" id="pg-agenda">

  <!-- Toolbar -->
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <!-- Selector de vista -->
    <div style="display:flex;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <button class="btn" id="ag-btn-dia"    onclick="agSetVista('dia')"    style="border-radius:0;border:none;border-right:0.5px solid var(--border)">Día</button>
      <button class="btn" id="ag-btn-semana" onclick="agSetVista('semana')" style="border-radius:0;border:none;border-right:0.5px solid var(--border)">Semana</button>
      <button class="btn" id="ag-btn-mes"    onclick="agSetVista('mes')"    style="border-radius:0;border:none">Mes</button>
    </div>
    <!-- Navegación -->
    <button class="btn" onclick="agNavPrev()"><i class="ti ti-chevron-left"></i></button>
    <button class="btn" style="font-size:11px" onclick="agNavHoy()">Hoy</button>
    <button class="btn" onclick="agNavNext()"><i class="ti ti-chevron-right"></i></button>
    <!-- Label de período -->
    <span id="ag-fecha-label" style="font-size:13px;font-weight:500;flex:1;white-space:nowrap"></span>
    <!-- Semáforo de capacidad -->
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 8px;background:var(--surface-1);border:0.5px solid var(--border);border-radius:var(--radius)">
      <span id="ag-semaforo-dot" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#10b981;flex-shrink:0"></span>
      <span id="ag-semaforo-label" style="color:var(--text-muted)">Capacidad</span>
    </div>
    <!-- Google Calendar -->
    <button class="btn" onclick="agToggleGCalPanel()"><i class="ti ti-brand-google"></i> Google Cal</button>
  </div>

  <!-- Panel Google Calendar (colapsable) -->
  <div id="ag-gcal-panel" style="display:none;margin-bottom:14px">
    <div class="card">
      <div class="ch">
        <span class="ct"><i class="ti ti-brand-google" style="font-size:13px"></i> Integración Google Calendar</span>
        <button class="btn" onclick="agToggleGCalPanel()"><i class="ti ti-x"></i></button>
      </div>
      <div class="g2">
        <div>
          <div class="fg">
            <label>Google Client ID</label>
            <input id="ag-gcal-clientid" placeholder="XXXX.apps.googleusercontent.com" oninput="agGCalGuardar()">
            <div style="font-size:10px;color:var(--text-muted);margin-top:3px">Obtenlo en <strong>console.cloud.google.com</strong> → APIs → Credenciales → OAuth 2.0</div>
          </div>
          <div class="fg">
            <label>Calendar ID</label>
            <input id="ag-gcal-calid" placeholder="primary  o  correo@gmail.com" oninput="agGCalGuardar()">
          </div>
          <div class="fg">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:400">
              <input type="checkbox" id="ag-gcal-auto" onchange="agGCalGuardar()">
              Sincronización automática al crear/editar OTs
            </label>
          </div>
        </div>
        <div>
          <div style="font-size:11px;margin-bottom:10px" id="ag-gcal-status-text">⚪ Desconectado</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <button class="btn bpa" id="ag-gcal-connect-btn"    onclick="agConectarGCal()"><i class="ti ti-brand-google"></i> Conectar con Google</button>
            <button class="btn"     id="ag-gcal-disconnect-btn" onclick="agDesconectarGCal()" style="display:none"><i class="ti ti-unlink"></i> Desconectar</button>
            <button class="btn"     id="ag-gcal-sync-btn"       onclick="agSincronizarOTs()"  style="display:none"><i class="ti ti-refresh"></i> Sincronizar OTs ahora</button>
          </div>
          <div class="al al-a" style="margin-top:10px;font-size:10px">
            <i class="ti ti-info-circle"></i>
            <div class="al-text">El origen autorizado en Google Cloud debe coincidir con la URL de producción del taller.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Contenedor del calendario -->
  <div class="card" style="padding:0;overflow:hidden">
    <!-- Header días (vista Día / Semana) -->
    <div id="ag-header-dias" style="display:none;border-bottom:0.5px solid var(--border)"></div>
    <!-- Grid scrollable (vista Día / Semana) -->
    <div id="ag-grid-wrap" style="display:none;overflow-y:auto;max-height:640px;position:relative">
      <div id="ag-grid"></div>
    </div>
    <!-- Grid mes -->
    <div id="ag-mes-grid" style="display:none"></div>
  </div>

</div>
