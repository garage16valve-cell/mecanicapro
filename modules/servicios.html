<!-- SERVICIOS -->
<div class="page active" id="pg-servicios">

  <!-- Tabs -->
  <div style="display:flex;gap:0;margin-bottom:16px;border-bottom:0.5px solid var(--border)">
    <button id="svc-tab-btn-prov" onclick="svcSetTab('prov')"
      style="padding:9px 18px;font-size:12px;font-weight:500;background:transparent;border:none;border-bottom:2px solid var(--fill-accent);color:var(--text-accent);cursor:pointer;font-family:var(--font-sans)">
      <i class="ti ti-building-store" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>Proveedores
    </button>
    <button id="svc-tab-btn-conf" onclick="svcSetTab('conf')"
      style="padding:9px 18px;font-size:12px;font-weight:500;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font-sans)">
      <i class="ti ti-settings" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>Configuración
    </button>
  </div>

  <!-- ===== TAB PROVEEDORES ===== -->
  <div id="svc-tab-prov" style="display:none">
    <div style="display:flex;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;font-weight:500">Proveedores del taller</span>
      <span style="font-size:11px;color:var(--text-muted);margin-left:8px" id="svc-prov-count"></span>
    </div>
    <div id="svc-prov-lista"></div>
  </div>

  <!-- ===== TAB CONFIGURACIÓN ===== -->
  <div id="svc-tab-conf" style="display:none">
    <div class="card" style="text-align:center;padding:32px 24px">
      <i class="ti ti-settings" style="font-size:36px;color:var(--text-muted);opacity:.4;display:block;margin-bottom:14px"></i>
      <div style="font-size:14px;font-weight:500;margin-bottom:8px">Configuración del catálogo de servicios</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:20px">
        El catálogo de servicios (precios, horas estimadas, repuestos sugeridos) se gestiona en<br>
        <strong>Admin &rsaquo; Configuración &rsaquo; Catálogo de servicios</strong>
      </div>
      <button class="btn bpa" onclick="nav('config',null)" style="margin:0 auto">
        <i class="ti ti-arrow-right"></i> Ir a Configuración
      </button>
    </div>
  </div>

</div>
