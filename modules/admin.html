<div class="module-wrap" id="module-admin">

  <h2 style="margin-bottom:20px">Configuración</h2>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px">

    <!-- COLUMNA IZQUIERDA: Datos del Taller -->
    <div>
      <h3 style="margin-bottom:14px">Datos del Taller</h3>

      <div style="background:var(--surface-1); padding:20px; border-radius:8px">

        <!-- Nombre del taller -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">Nombre del taller</label>
          <input type="text" id="taller-nombre-fantasia" placeholder="Integral Automotriz Spa" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
        </div>

        <!-- RUT -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">RUT</label>
          <input type="text" id="taller-rut" placeholder="76.543.210-8" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
        </div>

        <!-- Dirección -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">Dirección</label>
          <input type="text" id="taller-direccion" placeholder="Valparaíso, Chile" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
        </div>

        <!-- Teléfono -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">Teléfono</label>
          <input type="text" id="taller-telefono" placeholder="+56 9 5165 5331" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
        </div>

        <!-- Link de agendamiento -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">Link de agendamiento</label>
          <input type="text" id="taller-link-agenda" placeholder="plataforma.cl/agenda/..." style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
        </div>

        <!-- Logo del Taller -->
        <div style="margin-bottom:14px">
          <label style="font-weight:500; display:block; margin-bottom:10px">Logo del Taller</label>
          <div id="taller-logo-preview" style="width:100px; height:100px; background:var(--surface-2); border:2px dashed var(--border-color); border-radius:8px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; overflow:hidden">
            <span id="taller-logo-text" style="color:var(--text-muted); text-align:center; font-size:12px">Sin logo</span>
            <img id="taller-logo-img" style="display:none; max-width:100%; max-height:100%; object-fit:contain">
          </div>
          <input type="file" id="taller-logo-upload" accept="image/*" onchange="tallerCargarLogo()" style="margin-bottom:8px">
          <p style="font-size:11px; color:var(--text-muted); margin-bottom:8px">PNG o JPG, máximo 500KB</p>
          <button onclick="tallerEliminarLogo()" style="background:var(--bg-danger); color:white; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-size:12px">Eliminar logo</button>
        </div>

        <!-- Botón guardar -->
        <div style="margin-top:20px">
          <button onclick="tallerGuardarDatos()" style="background:var(--bg-primary); color:white; padding:12px 20px; border:none; border-radius:4px; cursor:pointer; font-weight:500; width:100%">Guardar datos del taller</button>
        </div>

      </div>
    </div>

    <!-- COLUMNA DERECHA: Configuración Operativa -->
    <div>
      <h3 style="margin-bottom:14px">Configuración operativa</h3>

      <div style="background:var(--surface-1); padding:20px; border-radius:8px">

        <!-- Hora inicio jornada -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">Hora inicio jornada</label>
          <input type="time" id="taller-hora-inicio" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
        </div>

        <!-- Hora fin jornada -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">Hora fin jornada</label>
          <input type="time" id="taller-hora-fin" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
        </div>

        <!-- Capacidad máxima -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">Capacidad máxima (hora/día)</label>
          <input type="number" id="taller-capacidad-maxima" placeholder="8" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
          <p style="font-size:11px; color:var(--text-muted); margin-top:4px">Afecta al semáforo de capacidad en Agenda</p>
        </div>

        <!-- Precio mínimo por hora -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">Precio mínimo por hora (Mano de obra)</label>
          <input type="number" id="taller-precio-minimo-hora" placeholder="25000" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
        </div>

        <!-- Descanso inicio -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">Descanso inicio</label>
          <input type="time" id="taller-descanso-inicio" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
        </div>

        <!-- Descanso fin -->
        <div style="margin-bottom:14px">
          <label style="display:block; font-size:12px; color:var(--text-muted); margin-bottom:4px">Descanso fin</label>
          <input type="time" id="taller-descanso-fin" style="width:100%; padding:10px; border:1px solid var(--border-color); border-radius:4px; box-sizing:border-box">
        </div>

      </div>
    </div>

  </div>

</div>
